version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: taskflow_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - taskflow_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: taskflow_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - taskflow_network
    command: redis-server --appendonly yes

  # Backend API
  backend:
    build: ./backend
    container_name: taskflow_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: taskflow_db
      DB_USER: taskflow_user
      DB_PASSWORD: taskflow_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_key_change_in_production}
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE: 5242880
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - taskflow_network

  # Frontend (Nginx + React)
  frontend:
    build: ./frontend
    container_name: taskflow_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - taskflow_network

# Volumes for persistence
volumes:
  mysql_data:
  redis_data:
  uploads_data:

# Network
networks:
  taskflow_network:
    driver: bridge